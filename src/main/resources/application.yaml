server:
  port: 8080

spring:
  application:
    name: test-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crm_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-prod-32chars!}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

admin:
  email: ${ADMIN_EMAIL:admin@crm.local}
  password: ${ADMIN_PASSWORD:admin123}
